name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify admin auth configuration
        run: |
          if [ -z "$VITE_ADMIN_USERNAME" ] || [ -z "$VITE_ADMIN_PASSWORD_HASH" ]; then
            echo "::error::Configura en el repositorio la variable VITE_ADMIN_USERNAME y el secreto VITE_ADMIN_PASSWORD_HASH (Settings → Secrets and variables → Actions)."
            exit 1
          fi
        env:
          VITE_ADMIN_USERNAME: ${{ vars.VITE_ADMIN_USERNAME }}
          VITE_ADMIN_PASSWORD_HASH: ${{ secrets.VITE_ADMIN_PASSWORD_HASH }}

      - name: Run tests
        run: npm test
        env:
          VITE_ADMIN_USERNAME: ${{ vars.VITE_ADMIN_USERNAME }}
          VITE_ADMIN_PASSWORD_HASH: ${{ secrets.VITE_ADMIN_PASSWORD_HASH }}
          VITE_ADMIN_SESSION_MINUTES: ${{ vars.VITE_ADMIN_SESSION_MINUTES }}

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /EquipoA/
          VITE_ADMIN_USERNAME: ${{ vars.VITE_ADMIN_USERNAME }}
          VITE_ADMIN_PASSWORD_HASH: ${{ secrets.VITE_ADMIN_PASSWORD_HASH }}
          VITE_ADMIN_SESSION_MINUTES: ${{ vars.VITE_ADMIN_SESSION_MINUTES }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
